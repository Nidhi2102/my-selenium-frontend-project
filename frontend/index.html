<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT | Admission Registration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Internal CSS: Specific overrides for this page */
        body {
            background: linear-gradient(135deg, #8e1a1a 0%, #003366 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="side-banner">
        <div class="logo-circle">SIT</div>
        <h1>Symbiosis</h1>
        <p>Institute of Technology</p>
        <div class="divider"></div>
        <p class="tagline">Engineering Tomorrow's Leaders</p>
    </div>

    <div class="form-section">
        <h2>Create Account</h2>
        <form id="registrationForm">
            <div class="input-box">
                <input type="text" id="name" placeholder="Full Name" required>
            </div>
            <div class="input-box">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <div class="gender-box">
                <label>Gender</label>
                <div class="checkbox-wrap">
                    <label><input type="checkbox" name="gender" value="Male"> Male</label>
                    <label><input type="checkbox" name="gender" value="Female"> Female</label>
                </div>
            </div>

            <div class="input-box">
                <select id="course">
                    <option value="">Select Department</option>
                    <option value="CS">Computer Science</option>
                    <option value="AI">AI & Machine Learning</option>
                    <option value="IT">Information Technology</option>
                    <option value="ME">Mechanical Engineering</option>
                </select>
            </div>

            <button type="submit" class="btn-register">Register Now</button>
            <p id="errorArea"></p>
        </form>
    </div>
</div>

<div id="successModal" class="modal-overlay">
    <div class="modal-card">
        <div class="success-check">✔</div>
        <h3>Registration Successful!</h3>
        <p>Welcome to SIT, <strong id="userDisplay"></strong>.</p>
        <button onclick="closeModal()" class="btn-done">Proceed to Dashboard</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
